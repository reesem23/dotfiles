###########################

# AUTOSTART PROGRAMS (db) #

###########################

plugin = /var/cache/hyprpm/db/hyprland-plugins/hyprexpo.so



exec-once = hyprpm reload -n

exec-once = ~/.config/hypr/expo-guard.sh

exec-once = dunst

exec-once = blueman-applet

exec-once = nm-applet

exec-once = awww-daemon

exec-once = ags run --gtk 3 ~/.config/ags/app.ts

exec-once = sleep 1 && awww img /home/db/Pictures/wallpapers/db.jpg



monitor = eDP-1,1920x1080@60,0x0,1.33



$terminal = foot



bind = SUPER, Q, exec, $terminal

bind = SUPER, RETURN, exec, $terminal

bind = SUPER, M, exit

bind = SUPER, R, exec, hyprctl reload

bind = SUPER SHIFT, Q, exec, kill -9 $(hyprctl activewindow -j | jq '.pid')

bind = SUPER, SPACE, exec, wofi --show drun --normal-window

bind = SUPER, S, exec, foot -e nano ~/dbshortcuts.txt

bind = SUPER, left, movefocus, l

bind = SUPER, right, movefocus, r

bind = SUPER, up, movefocus, u

bind = SUPER, down, movefocus, d

bind = , Print, exec, grim - | wl-copy

bind = SHIFT, Print, exec, grim -g "$(slurp)" - | wl-copy
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 10%-
bindel = , XF86MonBrightnessUp, exec, brightnessctl set +10%

# Direct dispatchers (no exec = no latency on Alt+Tab)
bind = ALT, TAB, hyprexpo:expo, toggle
bind = ALT, TAB, submap, expo
bind = ALT, TAB, exec, ~/.config/hypr/expo-nav.sh open

submap = expo

# Arrow keys move cursor over workspace thumbnails (expo stays open, no workspace switch)
binde = , right, exec, ~/.config/hypr/expo-nav.sh right
binde = , left,  exec, ~/.config/hypr/expo-nav.sh left
binde = , up,    exec, ~/.config/hypr/expo-nav.sh up
binde = , down,  exec, ~/.config/hypr/expo-nav.sh down

# Enter: immediately select hovered workspace; auto-selects after 3s of no input
bind = , return,  exec, ~/.config/hypr/expo-nav.sh enter
# Escape / Alt+Tab: close expo, stay on current workspace
bind = , escape,  exec, ~/.config/hypr/expo-nav.sh close
bind = ALT, TAB,  exec, ~/.config/hypr/expo-nav.sh close

submap = reset

# Workspace switching: Super + 1-9
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9

bind = SUPER, F, fullscreen


bind = SUPER SHIFT, F, exec, /home/db/bin/dbfloatall

bind = SUPER, B, exec, /home/db/bin/dbtogglebar

bindm = SUPER, mouse:272, movewindow

bindm = SUPER, mouse:273, resizewindow

# Theme switcher
bind = SUPER, T, exec, /home/db/bin/dbthemepick
bind = SUPER, H, exec, /home/db/.local/bin/minimize
bind = SUPER, TAB, togglespecialworkspace

general {

    border_size = 3

    gaps_in = 6

    gaps_out = 12

    col.active_border = rgba(d24d7ccc)

    col.inactive_border = rgba(190f12aa)

}



decoration {

    rounding = 12



    active_opacity = 0.9

    inactive_opacity = 0.70

    fullscreen_opacity = 1.0



    shadow {

        enabled = true

        range = 35

        render_power = 3

        color = rgba(d24d7ccc)

    }



    blur {

        enabled = true

        size = 8

        passes = 3

        new_optimizations = true

        vibrancy = 0.17

        vibrancy_darkness = 0.5

        noise = 0.012

    }

}



animations {

    enabled = yes



    bezier = db_smooth, 0.05, 0.9, 0.1, 1.0

    bezier = linear, 0.0, 0.0, 1.0, 1.0



    animation = global,        1, 7, db_smooth

    animation = windows,       1, 6, db_smooth, popin 80%

    animation = windowsIn,     1, 6, db_smooth, popin 80%

    animation = windowsOut,    1, 5, db_smooth, popin 80%

    animation = fade,          1, 5, db_smooth

    animation = fadeIn,        1, 5, db_smooth

    animation = fadeOut,       1, 5, db_smooth

    animation = border,        1, 4, db_smooth

    animation = workspaces,    1, 6, db_smooth, slide

    animation = workspacesIn,  1, 6, db_smooth, slide

    animation = workspacesOut, 1, 6, db_smooth, slide

}

misc {
    background_color = 0x000000
}



plugin {
    hyprexpo {
        columns = 3
        gap_size = 8
        bg_col = rgb(000000)
        workspace_method = first 1

        enable_gesture = false
    }

    dynamic-cursors {
        mode = tilt

        threshold = 2

        shake {
            enabled = true
            threshold = 4.0
            factor = 1.5
        }
    }
}
